name: Build Desktop App

on:
  workflow_dispatch: # manual trigger from the Actions tab
  push:
    tags:
      - "v*" # auto-build on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipCRM-Desktop-Windows
          path: dist/*.exe
          retention-days: 30

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlipCRM Desktop ${{ github.ref_name }}
          body: |
            ## FlipCRM Desktop — standalone installer

            - `FlipCRM-Desktop-Setup-*.exe` — Windows installer (NSIS)

            Installs side-by-side as **FlipCRM Desktop** (its own appId, folder,
            shortcut, and data). No login — opens straight to the dashboard with
            all data stored locally and offline.
          files: FlipCRM-Desktop-Windows/*
          draft: false
          prerelease: false
