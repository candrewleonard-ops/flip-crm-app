name: Build Desktop App

on:
  workflow_dispatch:        # manual trigger from GitHub UI
  push:
    tags:
      - 'v*'                # auto-trigger on version tags like v0.1.0

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        run: npm --prefix app install

      - name: Build Next.js standalone (in-repo app)
        run: npm --prefix app run build:desktop

      - name: Copy standalone into desktop
        run: node desktop/copy-standalone.js

      - name: Install Electron dependencies
        run: npm --prefix desktop install

      - name: Build Windows installer
        working-directory: desktop
        run: npx electron-builder --win --x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipCRM-Desktop-Windows
          path: desktop/dist/*.exe
          retention-days: 30

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlipCRM Desktop ${{ github.ref_name }}
          body: |
            ## FlipCRM Desktop — standalone installer

            - `FlipCRM-Desktop-Setup-*.exe` — Windows installer

            Installs as **FlipCRM Desktop** (side-by-side; does not replace any
            existing app). No login required — opens straight to the dashboard
            with local data.
          files: FlipCRM-Desktop-Windows/*
          draft: false
          prerelease: false
