name: Build Desktop Apps

on:
  workflow_dispatch:        # manual trigger from GitHub UI
  push:
    tags:
      - 'v*'                # auto-trigger on version tags like v0.1.0

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pull the `site` submodule (the website source)

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install website dependencies
        working-directory: site
        run: npm install

      - name: Build Next.js standalone
        working-directory: site
        run: DESKTOP_BUILD=true npm run build

      - name: Copy standalone into desktop-mac
        run: node desktop-mac/copy-standalone.js

      - name: Install Electron dependencies
        working-directory: desktop-mac
        run: npm install

      - name: Build macOS apps
        working-directory: desktop-mac
        run: |
          npx electron-builder --mac dmg zip --x64
          npx electron-builder --mac dmg zip --arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlipCRM-macOS
          path: |
            desktop-mac/dist/*.dmg
            desktop-mac/dist/*.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install website dependencies
        working-directory: site
        run: npm install

      - name: Build Next.js standalone
        working-directory: site
        run: npx cross-env DESKTOP_BUILD=true npm run build

      - name: Copy standalone into desktop
        run: node desktop/copy-standalone.js

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows installer
        working-directory: desktop
        run: npx electron-builder --win --x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlipCRM-Windows
          path: |
            desktop/dist/*.exe
          retention-days: 30

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlipCRM ${{ github.ref_name }}
          body: |
            ## FlipCRM Desktop Installer

            **macOS:**
            - `FlipCRM-*-mac-arm64.dmg` — Apple Silicon Macs (M1/M2/M3/M4)
            - `FlipCRM-*-mac-x64.dmg` — Intel Macs
            - `.zip` versions also included (unzip and drag to Applications)

            **Windows:**
            - `FlipCRM-Setup-*.exe` — Windows installer

            ### How to install
            **Mac:** Download the `.dmg`, open it, drag FlipCRM to Applications. First launch: right-click > Open.
            **Windows:** Download the `.exe`, double-click, follow the installer.
          files: |
            FlipCRM-macOS/*
            FlipCRM-Windows/*
          draft: false
          prerelease: false
